[phases.setup]
nixPkgs = ["php84", "php84Extensions.mbstring", "php84Extensions.bcmath", "php84Extensions.curl", "php84Extensions.fileinfo", "php84Extensions.openssl", "php84Extensions.pdo_mysql", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.zip"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-interaction"]

[phases.build]
cmds = ["npm install", "npm run build"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"